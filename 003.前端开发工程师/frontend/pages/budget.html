<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>预算 - 记账本</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body data-page="budget">

<div id="app">
  <div class="page-content">
    <!-- 页面头部 -->
    <div class="page-header">
      <h1>预算管理</h1>
      <p class="subtitle">掌控你的消费上限</p>
    </div>

    <!-- 月份选择器 -->
    <div class="month-picker">
      <button data-month-action="prev" aria-label="上个月">‹</button>
      <span class="month-label">2026年5月</span>
      <button data-month-action="next" aria-label="下个月">›</button>
    </div>

    <!-- 预算环形图 -->
    <div class="budget-ring-section">
      <div class="budget-ring" id="budget-ring">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="90" fill="none" stroke="var(--border)" stroke-width="12"/>
        </svg>
        <div class="center-text">
          <div class="pct">0%</div>
          <div class="label-sm">已使用</div>
        </div>
      </div>
    </div>

    <!-- 预算设置表单 -->
    <div class="budget-form">
      <label for="budget-amount-input">设置月度预算</label>
      <div class="budget-input-row">
        <input type="text" id="budget-amount-input" placeholder="输入预算金额" inputmode="decimal"/>
        <button class="btn btn-primary" id="btn-save-budget" style="width:auto;">保存</button>
      </div>
    </div>

    <!-- 预算统计 -->
    <div class="budget-stats">
      <div class="budget-stat-card">
        <div class="stat-value" id="budget-remaining">¥ 0.00</div>
        <div class="stat-label">剩余预算</div>
      </div>
      <div class="budget-stat-card">
        <div class="stat-value" id="budget-daily">¥ 0.00</div>
        <div class="stat-label">日均可用</div>
      </div>
    </div>

    <!-- 超预算警告 -->
    <div id="budget-warning" style="display:none;margin:var(--space);padding:var(--space);background:var(--expense-bg);border:1px solid var(--expense);border-radius:var(--radius);color:var(--expense);font-size:0.85rem;align-items:center;gap:var(--space-sm);">
      ⚠️ 预算即将耗尽，建议节省非必要支出
    </div>
  </div>
</div>

<script src="../js/storage.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
