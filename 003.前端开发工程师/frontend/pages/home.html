<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>首页 - 记账本</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body data-page="home">

<div id="app">
  <div class="page-content">
    <!-- 页面头部 -->
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:var(--space-sm);">
        <span id="greeting-avatar" style="font-size:1.8rem;">👤</span>
        <div>
          <h1 id="greeting-name">你好，用户</h1>
          <p class="subtitle">每一笔，都心中有数</p>
        </div>
      </div>
    </div>

    <!-- 月份选择器 -->
    <div class="month-picker">
      <button data-month-action="prev" aria-label="上个月">‹</button>
      <span class="month-label">2026年5月</span>
      <button data-month-action="next" aria-label="下个月">›</button>
    </div>

    <!-- 今日概览 -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="label"><span class="icon-dot expense"></span> 今日支出</div>
        <div class="amount expense" id="today-expense">¥ 0.00</div>
      </div>
      <div class="summary-card">
        <div class="label"><span class="icon-dot income"></span> 今日收入</div>
        <div class="amount income" id="today-income">¥ 0.00</div>
      </div>
    </div>

    <!-- 本月概览 -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="label"><span class="icon-dot expense"></span> 本月支出</div>
        <div class="amount expense" id="month-expense">¥ 0.00</div>
      </div>
      <div class="summary-card">
        <div class="label"><span class="icon-dot income"></span> 本月收入</div>
        <div class="amount income" id="month-income">¥ 0.00</div>
      </div>
    </div>

    <!-- 流水列表 -->
    <div class="section-title">近期流水</div>
    <div class="transaction-list" id="tx-list"></div>
  </div>
</div>

<script src="../js/storage.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
