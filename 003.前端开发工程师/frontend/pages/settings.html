<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的 - 记账本</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body data-page="settings">

<div id="app">
  <div class="page-content">
    <!-- 页面头部 -->
    <div class="page-header">
      <h1>我的</h1>
      <p class="subtitle">管理你的账号与数据</p>
    </div>

    <!-- 用户信息卡片 -->
    <div style="display:flex;align-items:center;gap:var(--space);padding:var(--space);margin:0 var(--space);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);">
      <div style="font-size:2.5rem;width:60px;height:60px;display:flex;align-items:center;justify-content:center;background:var(--surface-hover);border-radius:50%;" id="settings-avatar">👤</div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:1.05rem;" id="settings-nickname">用户</div>
        <div style="font-size:0.8rem;color:var(--text-secondary);">PIN: <span id="settings-pin-status">未设置</span></div>
      </div>
      <button style="background:none;border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;font-size:0.75rem;cursor:pointer;font-family:var(--font);color:var(--text-secondary);" id="btn-edit-avatar">更换头像</button>
    </div>

    <!-- 账号管理 -->
    <div class="settings-section" style="margin-top:var(--space-lg);">
      <h3>账号管理</h3>
      <div class="settings-item" id="btn-edit-nickname">
        <div class="si-left">
          <div class="si-icon">✏️</div>
          <div>
            <div class="si-title">修改昵称</div>
            <div class="si-subtitle">更新你的显示名称</div>
          </div>
        </div>
        <div class="si-arrow">›</div>
      </div>
      <div class="settings-item" id="btn-edit-pin">
        <div class="si-left">
          <div class="si-icon">🔒</div>
          <div>
            <div class="si-title">PIN 码设置</div>
            <div class="si-subtitle">管理应用锁密码</div>
          </div>
        </div>
        <div class="si-arrow">›</div>
      </div>
    </div>

    <!-- 数据管理 -->
    <div class="settings-section">
      <h3>数据管理</h3>
      <div class="settings-item" id="btn-reset">
        <div class="si-left">
          <div class="si-icon">🗑️</div>
          <div>
            <div class="si-title">重置数据</div>
            <div class="si-subtitle">清除所有记录并重新开始</div>
          </div>
        </div>
        <div class="si-arrow">›</div>
      </div>
    </div>

    <!-- 分类管理 -->
    <div class="settings-section">
      <h3>自定义分类</h3>
      <div id="cat-mgmt-list"></div>
      <div style="display:flex;gap:var(--space-sm);padding:var(--space-sm);align-items:center;flex-wrap:wrap;">
        <input type="text" id="new-cat-name" placeholder="分类名称" style="flex:1;min-width:80px;padding:8px var(--space-sm);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.85rem;font-family:var(--font);"/>
        <input type="text" id="new-cat-icon" placeholder="图标" style="width:50px;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.85rem;font-family:var(--font);"/>
        <select id="new-cat-type" style="padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.85rem;font-family:var(--font);">
          <option value="expense">支出</option>
          <option value="income">收入</option>
        </select>
        <button class="btn btn-primary" id="add-cat-btn" style="width:auto;padding:8px 16px;font-size:0.85rem;">添加</button>
      </div>
    </div>

    <!-- 退出登录 -->
    <div style="padding:var(--space-lg) var(--space);">
      <button class="btn btn-danger" id="btn-logout">退出当前登录</button>
    </div>

    <!-- 关于 -->
    <div style="text-align:center;padding:var(--space);color:var(--text-tertiary);font-size:0.75rem;">
      记账本 v1.0.1 · 数据完全本地存储
    </div>
  </div>
</div>

<script src="../js/storage.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
