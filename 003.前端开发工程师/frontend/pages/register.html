<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>注册 - 记账本</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body data-page="register">

<div id="app">
  <div class="page-content auth-page">
    <div class="auth-logo">🏦</div>
    <h1 class="auth-title">记账本</h1>
    <p class="auth-subtitle">个人财务管理专家</p>

    <div class="auth-card">
      <div class="field">
        <label for="reg-nickname">昵称（必填）</label>
        <input type="text" id="reg-nickname" placeholder="请输入你的昵称" maxlength="12" autocomplete="name"/>
      </div>

      <div class="field">
        <label>选择头像</label>
        <div class="avatar-grid">
          <div class="avatar-option selected" data-avatar="👤">👤</div>
          <div class="avatar-option" data-avatar="🐱">🐱</div>
          <div class="avatar-option" data-avatar="🐶">🐶</div>
          <div class="avatar-option" data-avatar="🐼">🐼</div>
          <div class="avatar-option" data-avatar="🦊">🦊</div>
          <div class="avatar-option" data-avatar="🐰">🐰</div>
        </div>
      </div>

      <div class="field">
        <label for="reg-pin">PIN 码（可选，4-6 位数字）</label>
        <input type="password" id="reg-pin" placeholder="设置后每次打开需验证" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="new-password"/>
      </div>

      <button id="btn-register" class="btn btn-primary" style="margin-top:var(--space);">开始使用 →</button>
    </div>

    <p style="margin-top:var(--space-lg);font-size:0.75rem;color:var(--text-tertiary);text-align:center;max-width:280px;">
      💡 你的数据仅存储在本设备中<br/>无需联网，绝对隐私安全
    </p>
  </div>
</div>

<script src="../js/storage.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
