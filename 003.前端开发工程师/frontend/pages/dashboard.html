<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>统计 - 记账本</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body data-page="dashboard">

<div id="app">
  <div class="page-content">
    <!-- 页面头部 -->
    <div class="page-header">
      <h1>收支分析</h1>
      <p class="subtitle">清楚看到钱去哪了</p>
    </div>

    <!-- 月份选择器 -->
    <div class="month-picker">
      <button data-month-action="prev" aria-label="上个月">‹</button>
      <span class="month-label">2026年5月</span>
      <button data-month-action="next" aria-label="下个月">›</button>
    </div>

    <!-- 饼图区域 -->
    <div class="pie-section">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:var(--space);">
        <h3 style="font-weight:600;">本月支出分类占比</h3>
        <div style="text-align:right;">
          <div style="font-size:0.7rem;text-transform:uppercase;color:var(--text-secondary);letter-spacing:0.05em;">总支出</div>
          <div style="font-size:1.5rem;font-weight:700;font-variant-numeric:tabular-nums;" id="total-spending">¥ 0.00</div>
        </div>
      </div>
      <div id="pie-container"></div>
    </div>

    <!-- 排行榜 -->
    <div class="section-title">分类排行</div>
    <div class="rank-list" id="rank-list"></div>
  </div>
</div>

<script src="../js/storage.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
