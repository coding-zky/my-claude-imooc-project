<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#98805d",
                        "on-secondary-fixed": "#2c1700",
                        "surface-container-low": "#f6f3f5",
                        "on-tertiary-fixed": "#271901",
                        "on-secondary-container": "#734400",
                        "tertiary-fixed-dim": "#dec29a",
                        "surface": "#fcf8fa",
                        "on-surface-variant": "#45464d",
                        "surface-tint": "#565e74",
                        "on-primary-fixed-variant": "#3f465c",
                        "primary-fixed": "#dae2fd",
                        "tertiary": "#000000",
                        "surface-variant": "#e4e2e4",
                        "on-tertiary-fixed-variant": "#574425",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "primary": "#000000",
                        "outline-variant": "#c6c6cd",
                        "on-surface": "#1b1b1d",
                        "secondary-fixed-dim": "#ffb86a",
                        "surface-container-highest": "#e4e2e4",
                        "on-background": "#1b1b1d",
                        "primary-fixed-dim": "#bec6e0",
                        "inverse-surface": "#303032",
                        "tertiary-fixed": "#fcdeb5",
                        "on-primary": "#ffffff",
                        "surface-dim": "#dcd9db",
                        "inverse-on-surface": "#f3f0f2",
                        "surface-container-high": "#eae7e9",
                        "outline": "#76777d",
                        "background": "#fcf8fa",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#fcf8fa",
                        "surface-container": "#f0edef",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#271901",
                        "secondary-fixed": "#ffdcbc",
                        "on-primary-fixed": "#131b2e",
                        "on-error": "#ffffff",
                        "primary-container": "#131b2e",
                        "on-primary-container": "#7c839b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "margin": "32px",
                        "stack-lg": "32px",
                        "gutter": "24px",
                        "unit": "4px",
                        "stack-md": "16px",
                        "container-max": "1440px"
                    },
                    "fontFamily": {
                        "headline-md": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "data-mono": ["Plus Jakarta Sans"],
                        "label-caps": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "body-sm": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "display-lg": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "data-mono": ["16px", {"lineHeight": "1", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcf8fa;
        }
        .glass-overlay {
            background: rgba(252, 248, 250, 0.8);
            backdrop-filter: blur(12px);
        }
        input::placeholder {
            color: #76777d;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-background text-on-background">
<!-- Background Dashboard (Blurred) -->
<div class="fixed inset-0 flex overflow-hidden filter blur-md pointer-events-none">
<!-- Side Navigation Anchor -->
<aside class="fixed left-0 top-0 h-full w-[280px] bg-surface flex flex-col h-full py-8 px-6 border-r border-outline-variant">
<div class="mb-12">
<h1 class="font-headline-md text-headline-md font-bold text-primary">Wealth Management</h1>
<p class="text-on-surface-variant font-body-sm">Private Banking</p>
</div>
<nav class="space-y-4">
<div class="flex items-center gap-4 py-3 px-4 text-primary font-bold border-r-4 border-secondary bg-surface-container">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-body-lg text-body-lg">Dashboard</span>
</div>
<div class="flex items-center gap-4 py-3 px-4 text-on-surface-variant font-medium">
<span class="material-symbols-outlined">insights</span>
<span class="font-body-lg text-body-lg">Statistics</span>
</div>
<div class="flex items-center gap-4 py-3 px-4 text-on-surface-variant font-medium">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-body-lg text-body-lg">Budget</span>
</div>
<div class="flex items-center gap-4 py-3 px-4 text-on-surface-variant font-medium">
<span class="material-symbols-outlined">person</span>
<span class="font-body-lg text-body-lg">Profile</span>
</div>
</nav>
</aside>
<!-- Main Content Area -->
<main class="ml-[280px] w-full p-gutter">
<header class="flex justify-between items-center w-full h-20 mb-8">
<h2 class="font-display-lg text-display-lg text-primary">Financial Suite</h2>
<div class="flex gap-4">
<button class="bg-primary text-on-primary px-6 py-3 rounded-full font-bold">Add Transaction</button>
<span class="material-symbols-outlined text-on-surface-variant p-2">notifications</span>
<span class="material-symbols-outlined text-on-surface-variant p-2">settings</span>
</div>
</header>
<div class="grid grid-cols-12 gap-gutter">
<div class="col-span-8 bg-surface-container-lowest border border-outline-variant rounded-xl p-6 h-64"></div>
<div class="col-span-4 bg-surface-container-lowest border border-outline-variant rounded-xl p-6 h-64"></div>
<div class="col-span-12 bg-surface-container-lowest border border-outline-variant rounded-xl p-6 h-96"></div>
</div>
</main>
</div>
<!-- Modal Backdrop -->
<div class="fixed inset-0 glass-overlay z-40 flex items-center justify-center p-4">
<!-- Transaction Modal -->
<div class="bg-surface-container-lowest w-full max-w-[520px] rounded-xl border border-outline-variant shadow-lg flex flex-col overflow-hidden animate-in fade-in zoom-in duration-300">
<!-- Modal Header -->
<div class="p-6 border-b border-outline-variant flex justify-between items-center">
<h3 class="font-headline-md text-headline-md text-primary">快速记账</h3>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="p-8 space-y-8">
<!-- Type Toggle -->
<div class="flex bg-surface-container p-1 rounded-lg">
<button class="flex-1 py-2.5 rounded-lg text-on-primary bg-primary font-bold transition-all">支出</button>
<button class="flex-1 py-2.5 rounded-lg text-on-surface-variant font-medium hover:bg-surface-container-high transition-all">收入</button>
</div>
<!-- Amount Input -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">金额 (CNY)</label>
<div class="relative flex items-center border-b-2 border-outline focus-within:border-secondary transition-colors pb-2">
<span class="text-headline-md font-bold mr-2">¥</span>
<input class="w-full text-display-lg font-bold bg-transparent border-none focus:ring-0 p-0 text-primary tabular-nums" placeholder="0.00" type="text"/>
</div>
</div>
<!-- Category Selector -->
<div class="space-y-3">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">选择分类</label>
<div class="grid grid-cols-4 gap-4">
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-secondary bg-secondary-fixed text-on-secondary-fixed transition-all">
<span class="material-symbols-outlined">restaurant</span>
<span class="text-body-sm font-medium">餐饮</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-outline-variant hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">directions_car</span>
<span class="text-body-sm font-medium">交通</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-outline-variant hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">shopping_bag</span>
<span class="text-body-sm font-medium">购物</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-outline-variant hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">theater_comedy</span>
<span class="text-body-sm font-medium">娱乐</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-outline-variant hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">home</span>
<span class="text-body-sm font-medium">居住</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-outline-variant hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">medical_services</span>
<span class="text-body-sm font-medium">医疗</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-outline-variant hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">school</span>
<span class="text-body-sm font-medium">教育</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-outline-variant hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">more_horiz</span>
<span class="text-body-sm font-medium">其他</span>
</button>
</div>
</div>
<!-- Date and Note -->
<div class="grid grid-cols-2 gap-gutter">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">日期</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-xl p-3 text-body-lg focus:border-secondary focus:ring-0 transition-colors" type="date" value="2023-10-27"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">备注</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-xl p-3 text-body-lg focus:border-secondary focus:ring-0 transition-colors" placeholder="添加描述..." type="text"/>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="p-8 pt-0">
<button class="w-full bg-primary text-on-primary py-4 rounded-full font-bold text-body-lg hover:opacity-90 active:scale-[0.98] transition-all shadow-md">
                    记一笔
                </button>
</div>
</div>
</div>
</body></html>
