<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Personal Finance Tool - PIN Verification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#574425",
                        "surface-container": "#f0edef",
                        "primary-fixed-dim": "#bec6e0",
                        "outline": "#76777d",
                        "surface-container-low": "#f6f3f5",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "tertiary": "#000000",
                        "tertiary-container": "#271901",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#2c1700",
                        "tertiary-fixed-dim": "#dec29a",
                        "primary": "#000000",
                        "primary-container": "#131b2e",
                        "surface": "#fcf8fa",
                        "on-surface-variant": "#45464d",
                        "on-secondary-container": "#734400",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f3f0f2",
                        "on-tertiary-container": "#98805d",
                        "secondary": "#895200",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#7c839b",
                        "surface-variant": "#e4e2e4",
                        "surface-dim": "#dcd9db",
                        "background": "#fcf8fa",
                        "on-error": "#ffffff",
                        "surface-container-high": "#eae7e9",
                        "surface-container-highest": "#e4e2e4",
                        "secondary-container": "#ffb157",
                        "surface-bright": "#fcf8fa",
                        "secondary-fixed": "#ffdcbc",
                        "on-secondary-fixed-variant": "#683d00",
                        "inverse-primary": "#bec6e0",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#565e74",
                        "outline-variant": "#c6c6cd",
                        "on-surface": "#1b1b1d",
                        "on-tertiary-fixed": "#271901",
                        "on-background": "#1b1b1d",
                        "inverse-surface": "#303032",
                        "primary-fixed": "#dae2fd",
                        "secondary-fixed-dim": "#ffb86a",
                        "on-primary-fixed": "#131b2e",
                        "on-primary-fixed-variant": "#3f465c",
                        "tertiary-fixed": "#fcdeb5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "stack-sm": "8px",
                        "unit": "4px",
                        "margin": "32px",
                        "stack-lg": "32px",
                        "container-max": "1440px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "body-sm": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "data-mono": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-caps": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "display-lg": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "data-mono": ["16px", {"lineHeight": "1", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .tabular-nums { font-variant-numeric: tabular-nums; }
        .pin-dot {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-background font-body-lg text-on-background min-h-screen flex items-center justify-center p-gutter">
<!-- Auth Container -->
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- App Identity -->
<div class="mb-stack-lg text-center">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center mb-stack-md mx-auto shadow-sm">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="account_balance">account_balance</span>
</div>
<h1 class="font-display-lg text-display-lg text-primary">Wealth Management</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-2">Private Banking Suite</p>
</div>
<!-- Verification Card -->
<section class="w-full bg-surface-container-lowest border border-outline-variant rounded-[32px] p-8 shadow-sm">
<!-- User Profile Preview -->
<div class="flex flex-col items-center mb-10">
<div class="w-20 h-20 bg-surface-container rounded-full flex items-center justify-center text-4xl mb-stack-md border border-outline-variant">
                    👤
                </div>
<h2 class="font-headline-md text-headline-md text-on-surface">小明</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">请输入您的 PIN 码</p>
</div>
<!-- PIN Input Indicator -->
<div class="flex justify-center space-x-6 mb-12">
<!-- Dot Active -->
<div class="pin-dot w-4 h-4 rounded-full bg-primary ring-4 ring-primary-container/10"></div>
<!-- Dot Active -->
<div class="pin-dot w-4 h-4 rounded-full bg-primary ring-4 ring-primary-container/10"></div>
<!-- Dot Inactive -->
<div class="pin-dot w-4 h-4 rounded-full bg-surface-variant"></div>
<!-- Dot Inactive -->
<div class="pin-dot w-4 h-4 rounded-full bg-surface-variant"></div>
</div>
<!-- Numeric Keypad -->
<div class="grid grid-cols-3 gap-y-6 gap-x-8 tabular-nums max-w-[320px] mx-auto">
<button class="w-full aspect-square rounded-full flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-surface-container-high active:scale-95 transition-all">1</button>
<button class="w-full aspect-square rounded-full flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-surface-container-high active:scale-95 transition-all">2</button>
<button class="w-full aspect-square rounded-full flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-surface-container-high active:scale-95 transition-all">3</button>
<button class="w-full aspect-square rounded-full flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-surface-container-high active:scale-95 transition-all">4</button>
<button class="w-full aspect-square rounded-full flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-surface-container-high active:scale-95 transition-all">5</button>
<button class="w-full aspect-square rounded-full flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-surface-container-high active:scale-95 transition-all">6</button>
<button class="w-full aspect-square rounded-full flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-surface-container-high active:scale-95 transition-all">7</button>
<button class="w-full aspect-square rounded-full flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-surface-container-high active:scale-95 transition-all">8</button>
<button class="w-full aspect-square rounded-full flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-surface-container-high active:scale-95 transition-all">9</button>
<button class="w-full aspect-square rounded-full flex items-center justify-center hover:bg-surface-container-high active:scale-95 transition-all text-on-surface-variant">
<span class="material-symbols-outlined text-[28px]" data-icon="backspace">backspace</span>
</button>
<button class="w-full aspect-square rounded-full flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-surface-container-high active:scale-95 transition-all">0</button>
<button class="w-full aspect-square rounded-full flex items-center justify-center bg-primary text-on-primary hover:opacity-90 active:scale-95 transition-all shadow-md">
<span class="material-symbols-outlined text-[28px]" data-icon="check" data-weight="fill">check</span>
</button>
</div>
</section>
<!-- Footer Links -->
<footer class="mt-stack-lg text-center">
<button class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors py-2 px-4">
                忘记 PIN？<span class="text-secondary font-medium">[重置数据]</span>
</button>
</footer>
<!-- Security Badge -->
<div class="mt-12 flex items-center gap-2 opacity-40">
<span class="material-symbols-outlined text-sm" data-icon="lock">lock</span>
<span class="font-label-caps text-label-caps uppercase">End-to-End Encrypted</span>
</div>
</main>
<!-- Visual Decor (Minimal Institutional feel) -->
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-secondary to-primary opacity-20"></div>
</body></html>
